<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Dodgers Tracker</title>
</head>

<body>
    <header>
        <div class="stop">
            <div class="gradient-bottom">
                <div class="topbar">
                    <div class="logo">
                        <img src="assets/images/dodgers.svg" alt="Dodgers">
                    </div>
                    <h1>Dodgers Tracker</h1>
                </div>
            </div>
        </div>
    </header>



    <main>
        <div id="current-match"></div>
        <div id="past-matches"></div>
        <div id="older-matches"></div>

        <section class="mlb-links">
            <a href="https://www.mlb.com">
                <div class="mlb-site">
                    <h3>OFICJALNA STRONA MLB</h3>
                    <img class="mlb-official-image" src="assets/images/MLB.svg" alt="MLB">
                </div>
            </a>
            <a href="https://www.mlb.com/dodgers">
                <div class="mlb-site">
                    <h3>OFICJALNA STRONA LA DODGERS</h3>
                    <img class="mlb-official-image" src="assets/images/dodgers.svg" alt="LAD">
                </div>
            </a>
        </section>
    </main>



    <footer>
        <div id="footer-controls"></div>
        <p>© 2026 Dodgers Tracker</p>
        <p>Projekt i wykonanie: Maciek104</p>
    </footer>
</body>

<script src="scripts/current-match.js"></script>
<script src="scripts/past-matches.js"></script>
<script src="scripts/older-matches.js"></script>
<script src="scripts/information.js"></script>
<script src="scripts/style-switcher.js"></script>

</html>
